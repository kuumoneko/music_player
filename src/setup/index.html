<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Loading Spinner</title>
        <style>
            /* Container styling (flex, col, center) */
            .loader-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding-top: 1rem;
                padding-bottom: 1rem;
                /* Added background to make the light gray text visible */
                background-color: #1a1a1a;
                min-height: 200px;
                font-family: sans-serif;
            }

            /* Spinner styling */
            .spinner {
                width: 2.25rem; /* w-9 */
                height: 2.25rem; /* h-9 */
                border-radius: 9999px; /* rounded-full */
                border: 4px solid #e5e7eb; /* border-4 border-gray-200 */
                border-left-color: #93c5fd; /* border-l-blue-300 */
                margin-left: auto;
                margin-right: auto;
                margin-top: 1rem;
                margin-bottom: 1rem;
                animation: spin 1s linear infinite; /* animate-spin */
            }

            /* Text styling */
            .loader-text {
                font-size: 1.125rem; /* text-lg */
                color: #d1d5db; /* text-gray-300 */
                margin-top: 0.5rem; /* mt-2 */
            }

            /* Keyframes for the rotation */
            @keyframes spin {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="loader-container">
            <div class="spinner"></div>
            <p class="loader-text">
                Setting up app enviroment... please wait...
            </p>
        </div>
    </body>
</html>
